animations {
    enabled = true

    # Curves
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.0
    bezier = windows_default, 0.05, 0.9, -0.14, 1
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = stall, 1, -0.1, 0.7, 0.85

    # Global animation
    animation = global,        1,     10,    default

    # Window animations
    animation = windowsIn, 1, 4, windows_default, slide
    animation = fadeIn, 1, 5, emphasizedDecel
    animation = windowsOut, 1, 7, windows_default, popin 80% 
    animation = fadeOut, 1, 5, emphasizedDecel
    animation = windowsMove, 1, 5, emphasizedDecel, popin
    animation = border, 1, 10, emphasizedDecel

    # Layer animations
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%
    
    # fade
    animation = fadeLayersIn, 1, 3.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall

    # Workspace animations
    animation = workspaces, 1, 10,   menu_decel, slide
    animation = specialWorkspaceIn, 1, 10, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 10, emphasizedAccel, slidevert

    # zoom
    animation = zoomFactor, 1, 3, standardDecel
}
