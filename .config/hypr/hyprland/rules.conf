# Disable blur for xwayland context menus
windowrule = match:class ^()$, match:title ^()$, no_blur on

# Floating
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on, center on, size (monitor_w*.45) (monitor_h*.45)
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, center on
windowrule = match:title ^(Discord Updater)$, center on
windowrule = match:class ^(io.github.kaii_lb.Overskride)$, float on, center on, size (monitor_w*.45) (monitor_h*.45)
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on, center on, size (monitor_w*.60) (monitor_h*.65)
windowrule = match:title ^(vkcube)$, float on, center on, size (monitor_w*.20) (monitor_h*.40)
windowrule = match:title ^(Friends List)$, float on, center on, size (monitor_w*.16) (monitor_h*.70)
windowrule = match:title ^(Steam Settings)$, float on, center on, size (monitor_w*.60) (monitor_h*.60)
windowrule = match:class ^(org.gnome.clocks)$, float on, center on, size (monitor_w*.45) (monitor_h*.55)
windowrule = match:class ^(com.network.manager)$, float on, center on, size (monitor_w*.40) (monitor_h*.45)
windowrule = match:class ^(qalculate-gtk)$, float on, center on, size (monitor_w*.45) (monitor_h*.55)
windowrule = match:class ^(fdm)$, float on, center on, size (monitor_w*.50) (monitor_h*.50)
windowrule = match:class ^(waypaper)$, float on, center on, size (monitor_w*.43) (monitor_h*.48)
windowrule = match:class ^(com.github.wwmm.easyeffects)$, float on, center on, size (monitor_w*.60) (monitor_h*.60)
windowrule = match:class ^(scrcpy)$, float on, center on, size (monitor_w*.66) (monitor_h*.71)
windowrule = match:title ^(Add Non-Steam Game)$, float on, center on, size (monitor_w*.40) (monitor_h*.50)
windowrule = match:class ^(org.gnome.FileRoller)$, float on, center on, size (monitor_w*.50) (monitor_h*.50)
windowrule = match:class ^(com.gabm.satty)$, float on, center on, size (monitor_w*.50) (monitor_h*.50)
windowrule = match:title ^(Save Image As)$, float on, center on, size (monitor_w*.50) (monitor_h*.55)
windowrule = match:class ^(org.gnome.Calendar)$, float on, center on, size (monitor_w*.50) (monitor_h*.55)
windowrule = match:class ^(org.gnome.Weather)$, float on, center on, size (monitor_w*.50) (monitor_h*.55)
windowrule = match:title ^(GParted)$, float on, center on, size (monitor_w*.60) (monitor_h*.55)
windowrule = match:class ^(timeshift-gtk)$, float on, center on, size (monitor_w*.40) (monitor_h*.55)
windowrule = match:class ^(org.gnome.SystemMonitor)$, float on, center on, size (monitor_w*.50) (monitor_h*.50)
windowrule = match:class ^(org.gnome.SystemMonitor)$, float on, center on, size (monitor_w*.50) (monitor_h*.50)
windowrule = match:title ^(BakkesModInjectorCpp)$, float on, center on, size (monitor_w*.20) (monitor_h*.10) 
windowrule = match:class ^(zenity)$, float on, center on

# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:namespace .*, suppress_event maximize

windowrule = match:float 1, animation popin

# Tiling
windowrule = match:class ^dev\.warp\.Warp$, tile on

# Picture-in-Picture
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float on, keep_aspect_ratio on, float on, pin on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, move (monitor_w*.73) (monitor_h*.72)
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, size (monitor_w*.25) (monitor_h*.25)

# --- Tearing ---
windowrule = match:class ^(org.vinegarhq.Sober)$ immediate on
windowrule = match:title .*\.exe, immediate on
windowrule = match:class ^(steam_app).*, immediate on

# Fix Jetbrain IDEs focus/rerendering problem
windowrule = match:class ^jetbrains-.*$, match:float 1, match:title ^$|^\s$|^win\d+$, no_initial_focus on

# ######## Workspace rules ########
workspace = special:special, gapsout:30

# ######## Layer rules ########
layerrule = match:namespace wayfreeze, no_anim on
layerrule = match:namespace noanim, no_anim on
layerrule = match:namespace .*, xray on
layerrule = match:namespace selection, no_anim on
layerrule = match:namespace indicator.*, no_anim on
layerrule = match:namespace hyprpicker, no_anim on
layerrule = match:namespace rofi, animation slide bottom
layerrule = match:namespace swaync-control-center, animation slide right

# Launchers need to be FAST
layerrule = match:namespace gtk4-layer-shell, no_anim on
